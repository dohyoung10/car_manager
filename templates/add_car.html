{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:480px; margin:30px auto;">
    <h2>차량 등록</h2>
    <form method="post">
        <label>차량 이름 (예: 아반떼 CN7)</label>
        <input type="text" name="car_name" required>
        <label>현재 주행거리 (km)</label>
        <input type="number" name="mileage" value="0">
        <button type="submit" class="btn">등록</button>
        <a href="/" class="btn btn-gray">취소</a>
    </form>
</div>
{% endblock %}
